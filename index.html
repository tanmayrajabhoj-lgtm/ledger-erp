<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shree Classes — Tuition ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F3B2C; --ink-2:#28493A;
    --paper:#EDEFE3; --paper-2:#E4E7D8; --card:#F7F8F1;
    --rule:#C9C2AE; --mustard:#D9A441; --mustard-dark:#B98423;
    --text:#1B2A22; --text-soft:#5B6459;
    --red:#A63D40; --red-bg:#F3E3E1;
    --blue:#3E6990; --blue-bg:#E3EBF1;
    --green-ok:#3E7A4F; --green-ok-bg:#E1EEE3;
    --radius:10px;
    --shadow: 0 1px 2px rgba(27,42,34,0.06), 0 4px 14px rgba(27,42,34,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{ font-family:'Inter',sans-serif; background:var(--paper); color:var(--text); -webkit-font-smoothing:antialiased; }
  #app{display:flex; min-height:100vh;}

  /* ---------- LOGIN ---------- */
  #loginScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 15%, rgba(217,164,65,0.10), transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(217,164,65,0.06), transparent 45%),
      linear-gradient(180deg, var(--ink), var(--ink-2));
    padding:24px;
  }
  .login-card{
    width:100%; max-width:400px; background:var(--card); border-radius:14px;
    box-shadow:0 24px 70px rgba(0,0,0,0.35); overflow:hidden; border:1px solid rgba(0,0,0,0.05);
  }
  .login-head{ padding:28px 30px 18px; text-align:center; border-bottom:1px solid var(--rule);}
  .login-mark{ font-family:'Fraunces',serif; font-weight:700; font-size:28px; color:var(--text); }
  .login-sub{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--mustard-dark); margin-top:4px; }
  .login-tabs{ display:flex; }
  .login-tab{
    flex:1; text-align:center; padding:13px 0; font-weight:600; font-size:13.5px;
    color:var(--text-soft); cursor:pointer; border-bottom:2px solid var(--rule); background:var(--paper-2);
  }
  .login-tab.active{ color:var(--text); background:var(--card); border-bottom:2px solid var(--mustard); }
  .login-body{ padding:26px 30px 28px; }
  .login-err{ background:var(--red-bg); color:var(--red); font-size:12.5px; padding:9px 12px; border-radius:7px; margin-bottom:14px; display:none; }
  .login-hint{ font-size:11.5px; color:var(--text-soft); margin-top:16px; line-height:1.5; text-align:center; }

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:222px; flex-shrink:0;
    background: radial-gradient(circle at 20% 10%, rgba(255,255,255,0.03), transparent 40%), linear-gradient(180deg, var(--ink), var(--ink-2));
    color:#EDEFE3; display:flex; flex-direction:column; padding:22px 0 16px; position:sticky; top:0; height:100vh;
  }
  .brand{ padding:0 22px 20px; border-bottom:1px solid rgba(237,239,227,0.12); margin-bottom:14px; }
  .brand-mark{ font-family:'Fraunces',serif; font-weight:600; font-size:23px; color:#F7F8F1; }
  .brand-sub{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--mustard); margin-top:4px; }
  .nav{list-style:none; margin:0; padding:0; flex:1;}
  .nav-item{ display:flex; align-items:center; gap:11px; padding:11px 22px; font-size:14px; font-weight:500; color:#D8DBC9; cursor:pointer; border-left:3px solid transparent; transition:background .15s ease, color .15s ease; }
  .nav-item:hover{ background:rgba(255,255,255,0.05); color:#F7F8F1; }
  .nav-item.active{ background:rgba(217,164,65,0.14); color:#F7F8F1; border-left:3px solid var(--mustard); }
  .nav-ico{width:16px; text-align:center; opacity:0.9; font-size:14px;}
  .nav-count{ margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#B7BCA4; background:rgba(255,255,255,0.07); padding:1px 6px; border-radius:20px; }
  .sidebar-foot{ padding:14px 22px 0; border-top:1px solid rgba(237,239,227,0.12); }
  .who{ font-size:12.5px; color:#F0F1E6; font-weight:600; }
  .who-role{ font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--mustard); margin-top:2px;}
  .logout-btn{ margin-top:10px; width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); color:#EDEFE3; padding:8px; border-radius:7px; font-size:12px; cursor:pointer; font-weight:600;}
  .logout-btn:hover{ background:rgba(255,255,255,0.12); }

  /* ---------- MAIN ---------- */
  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{ display:flex; align-items:baseline; justify-content:space-between; padding:26px 34px 18px; border-bottom:1px solid var(--rule); }
  .page-title{ font-family:'Fraunces',serif; font-weight:600; font-size:28px; color:var(--text); }
  .page-sub{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--text-soft); margin-top:4px; }
  .today{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-soft); text-align:right; }
  .content{padding:26px 34px 60px; flex:1;}

  /* ---------- BUTTONS / INPUTS ---------- */
  .btn{ font-family:'Inter',sans-serif; font-weight:600; font-size:13px; padding:9px 16px; border-radius:7px; border:1px solid transparent; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition: transform .08s ease, box-shadow .12s ease; }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--ink); color:#F7F8F1;} .btn-primary:hover{background:var(--ink-2);}
  .btn-accent{background:var(--mustard); color:#2A2110;} .btn-accent:hover{background:var(--mustard-dark);}
  .btn-ghost{background:transparent; color:var(--text); border:1px solid var(--rule);} .btn-ghost:hover{background:var(--paper-2);}
  .btn-danger{background:transparent; color:var(--red); border:1px solid #E0C3C3;} .btn-danger:hover{background:var(--red-bg);}
  .btn-block{ width:100%; justify-content:center; }
  .btn-sm{padding:5px 10px; font-size:12px; border-radius:6px;}
  input, select, textarea{ font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 11px; border-radius:7px; border:1px solid var(--rule); background:var(--card); color:var(--text); outline:none; width:100%; }
  textarea{ resize:vertical; min-height:80px; font-family:'Inter',sans-serif; }
  input:focus, select:focus, textarea:focus{ border-color:var(--mustard-dark); box-shadow:0 0 0 3px rgba(217,164,65,0.18); }
  label{ font-size:11.5px; font-weight:600; color:var(--text-soft); text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:5px;}
  .field{ display:flex; flex-direction:column; margin-bottom:14px; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  /* ---------- CARDS / STATS ---------- */
  .stat-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:26px; }
  .stat-card{ background:var(--card); border:1px solid var(--rule); border-radius:var(--radius); padding:18px 18px 16px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
  .stat-card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--mustard); }
  .stat-label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-soft);}
  .stat-num{ font-family:'Fraunces',serif; font-weight:600; font-size:32px; margin-top:6px; color:var(--text);}
  .stat-note{ font-size:11.5px; color:var(--text-soft); margin-top:4px;}

  .panel{ background:var(--card); border:1px solid var(--rule); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:22px; overflow:hidden; }
  .panel-head{ display:flex; align-items:center; justify-content:space-between; padding:15px 18px; border-bottom:1px solid var(--rule); background:linear-gradient(180deg, rgba(217,164,65,0.06), transparent); }
  .panel-title{ font-family:'Fraunces',serif; font-weight:600; font-size:17px; }
  .panel-body{ padding:18px; }

  table.ledger{ width:100%; border-collapse:collapse; }
  table.ledger thead th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-soft); padding:0 12px 10px; border-bottom:2px solid var(--ink); }
  table.ledger tbody td{ padding:11px 12px; border-bottom:1px solid var(--rule); font-size:13.5px; vertical-align:middle; }
  table.ledger tbody tr:hover{ background:rgba(217,164,65,0.07); }
  .mono{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; }
  .pill{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; font-family:'IBM Plex Mono',monospace; }
  .pill-green{ background:var(--green-ok-bg); color:var(--green-ok); }
  .pill-red{ background:var(--red-bg); color:var(--red); }
  .pill-blue{ background:var(--blue-bg); color:var(--blue); }
  .pill-mustard{ background:#F5E7C6; color:var(--mustard-dark); }
  .row-actions{ display:flex; gap:6px; }
  .empty-state{ text-align:center; padding:50px 20px; color:var(--text-soft); }
  .empty-state .big{ font-family:'Fraunces',serif; font-size:19px; color:var(--text); margin-bottom:6px;}

  /* ---------- MODAL ---------- */
  .modal-overlay{ position:fixed; inset:0; background:rgba(27,42,34,0.45); display:none; align-items:flex-start; justify-content:center; padding:50px 20px; z-index:100; overflow-y:auto; }
  .modal-overlay.open{ display:flex; }
  .modal{ background:var(--card); border-radius:12px; width:100%; max-width:480px; box-shadow:0 20px 60px rgba(0,0,0,0.25); border:1px solid var(--rule); }
  .modal-head{ display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--rule); }
  .modal-title{ font-family:'Fraunces',serif; font-weight:600; font-size:19px; }
  .modal-close{ cursor:pointer; font-size:18px; color:var(--text-soft); background:none; border:none; }
  .modal-body{ padding:20px; }
  .modal-foot{ padding:14px 20px; border-top:1px solid var(--rule); display:flex; justify-content:flex-end; gap:10px; }

  .att-controls{ display:flex; gap:14px; align-items:flex-end; margin-bottom:18px; flex-wrap:wrap; }
  .att-list-item{ display:flex; align-items:center; justify-content:space-between; padding:11px 14px; border-bottom:1px solid var(--rule); }
  .att-list-item:last-child{ border-bottom:none; }
  .toggle-group{ display:flex; gap:6px; }
  .toggle-btn{ width:36px; height:30px; border-radius:6px; border:1px solid var(--rule); background:var(--paper); cursor:pointer; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:12px; color:var(--text-soft); }
  .toggle-btn.p-active{ background:var(--green-ok-bg); color:var(--green-ok); border-color:var(--green-ok); }
  .toggle-btn.a-active{ background:var(--red-bg); color:var(--red); border-color:var(--red); }

  .tt-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:12px; }
  .tt-day{ background:var(--card); border:1px solid var(--rule); border-radius:var(--radius); overflow:hidden;}
  .tt-day-head{ background:var(--ink); color:#F7F8F1; font-family:'Fraunces',serif; font-weight:600; font-size:14px; padding:9px 12px;}
  .tt-slot{ padding:10px 12px; border-bottom:1px solid var(--rule); font-size:12.5px; }
  .tt-slot:last-child{ border-bottom:none; }
  .tt-slot .t{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--mustard-dark); font-weight:600; }
  .tt-empty{ padding:14px 12px; color:var(--text-soft); font-size:12px; font-style:italic;}

  .searchbar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .searchbar input, .searchbar select{ flex:1; min-width:160px; }
  .toast{ position:fixed; bottom:24px; right:24px; background:var(--ink); color:#F7F8F1; padding:12px 18px; border-radius:8px; font-size:13px; box-shadow:var(--shadow); opacity:0; transform:translateY(10px); transition:all .25s ease; z-index:200; pointer-events:none; max-width:320px; }
  .toast.show{ opacity:1; transform:translateY(0); }
  ::placeholder{ color:#9AA290; }
  .hint{ font-size:12px; color:var(--text-soft); margin-top:-6px; margin-bottom:14px;}

  /* homework card */
  .hw-card{ border:1px solid var(--rule); border-radius:10px; padding:14px 16px; margin-bottom:12px; background:var(--card); }
  .hw-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .hw-title{ font-family:'Fraunces',serif; font-weight:600; font-size:16px; }
  .hw-meta{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-soft); margin-top:3px; }
  .hw-desc{ font-size:13px; color:var(--text); margin-top:8px; line-height:1.5; white-space:pre-wrap; }
  .hw-done-badge{ display:flex; align-items:center; gap:6px; }
  .check-toggle{ width:20px; height:20px; border-radius:5px; border:2px solid var(--rule); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; font-size:12px; }
  .check-toggle.done{ background:var(--green-ok); border-color:var(--green-ok); color:#fff; }
  .att-list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .att-chip{ display:flex; align-items:center; gap:6px; background:var(--paper-2); border:1px solid var(--rule); border-radius:20px; padding:4px 10px 4px 4px; font-size:12px; color:var(--text); text-decoration:none; max-width:220px; }
  .att-chip:hover{ border-color:var(--mustard-dark); }
  .att-chip img{ width:22px; height:22px; object-fit:cover; border-radius:50%; flex:none; }
  .att-chip .att-ico{ width:22px; height:22px; border-radius:50%; background:var(--ink); color:#F7F8F1; display:flex; align-items:center; justify-content:center; font-size:11px; flex:none; }
  .att-chip .att-name{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .att-chip .att-remove{ margin-left:2px; color:var(--red); font-weight:700; cursor:pointer; flex:none; }
  .assign-toggle{ display:flex; gap:8px; margin-bottom:14px; }
  .assign-toggle button{ flex:1; padding:8px 0; border-radius:7px; border:1px solid var(--rule); background:var(--paper-2); color:var(--text-soft); font-weight:600; font-size:12.5px; cursor:pointer; }
  .assign-toggle button.active{ background:var(--ink); color:#F7F8F1; border-color:var(--ink); }

  .payline{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border:1px solid var(--rule); border-radius:10px; margin-bottom:10px; background:var(--card); }
  .pay-modal-amount{ font-family:'Fraunces',serif; font-size:34px; font-weight:700; text-align:center; margin:6px 0 18px; }
  .qr-wrap{ display:flex; justify-content:center; margin-bottom:14px; }
  .qr-wrap img{ width:190px; height:auto; border:1px solid var(--rule); border-radius:10px; background:#fff; padding:8px; }
  .upload-box{ border:1.5px dashed var(--rule); border-radius:10px; padding:16px; text-align:center; cursor:pointer; background:var(--paper-2); transition:border-color .12s ease; }
  .upload-box:hover{ border-color:var(--mustard-dark); }
  .upload-box input[type=file]{ display:none; }
  .upload-preview{ max-width:100%; max-height:220px; border-radius:8px; border:1px solid var(--rule); display:block; margin:0 auto 10px; }
  .ss-thumb{ width:38px; height:38px; object-fit:cover; border-radius:6px; border:1px solid var(--rule); cursor:pointer; vertical-align:middle; }
  .verify-img{ width:100%; max-height:420px; object-fit:contain; border-radius:10px; border:1px solid var(--rule); background:var(--paper-2); display:block; margin-bottom:14px; }
  .pick-row{ display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px solid var(--rule); }
  .pick-row:last-child{ border-bottom:none; }
  .pick-row input[type=checkbox]{ width:16px; height:16px; flex:none; accent-color:var(--mustard-dark); }
  .pick-row.disabled{ opacity:0.5; }
  .pick-name{ flex:1; font-size:13.5px; }
  .pick-sub{ font-size:11px; color:var(--text-soft); margin-top:1px; }
  .pick-list{ max-height:320px; overflow-y:auto; border:1px solid var(--rule); border-radius:8px; padding:2px 10px; margin-top:8px; }
  .pick-header{ display:flex; align-items:center; justify-content:space-between; gap:10px; }

  /* ---------- MOBILE ---------- */
  .hamburger{ display:none; background:none; border:none; cursor:pointer; padding:6px; margin-right:10px; flex:none; }
  .hamburger span{ display:block; width:22px; height:2px; background:var(--text); margin:5px 0; border-radius:2px; }
  .sidebar-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:149; }
  .sidebar-overlay.open{ display:block; }

  @media (max-width: 860px){
    #app{ display:block; }
    .hamburger{ display:inline-block; }
    .sidebar{
      position:fixed; left:0; top:0; z-index:150; width:250px;
      transform:translateX(-100%); transition:transform .22s ease; box-shadow:0 0 40px rgba(0,0,0,0.3);
    }
    .sidebar.open{ transform:translateX(0); }
    .main{ width:100%; }
    .topbar{ padding:18px 16px 14px; flex-wrap:wrap; gap:10px; align-items:center; }
    .topbar > div:first-child{ display:flex; align-items:center; }
    .page-title{ font-size:21px; }
    .today{ width:100%; text-align:left; order:3; }
    .content{ padding:16px 14px 40px; }
    .stat-grid{ grid-template-columns:repeat(2,1fr); gap:10px; }
    .field-row{ grid-template-columns:1fr; gap:0; }
    .tt-grid{ grid-template-columns:1fr 1fr; }
    .panel-body{ overflow-x:auto; }
    table.ledger{ min-width:560px; }
    .modal-overlay{ padding:16px; }
    .modal{ max-width:100%; }
    .login-card{ max-width:100%; }
  }
  @media (max-width: 480px){
    .stat-grid{ grid-template-columns:1fr; }
    .tt-grid{ grid-template-columns:1fr; }
    .page-title{ font-size:19px; }
    .att-controls{ flex-direction:column; align-items:stretch; }
  }
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-card">
    <div class="login-head">
      <div class="login-mark">Shree Classes</div>
      <div class="login-sub">Tuition ERP</div>
    </div>
    <div class="login-tabs">
      <div class="login-tab active" id="tabAdmin" onclick="switchLoginTab('admin')">Admin / Teacher</div>
      <div class="login-tab" id="tabStudent" onclick="switchLoginTab('student')">Student</div>
    </div>
    <div class="login-body">
      <div class="login-err" id="loginErr"></div>
      <div class="field"><label id="loginUserLabel">Username</label><input id="loginUser" placeholder="admin"></div>
      <div class="field"><label>Password</label><input id="loginPass" type="password" placeholder="••••••••"></div>
      <button class="btn btn-accent btn-block" onclick="attemptLogin()">Sign In</button>
      <div class="login-hint" id="loginHint">Default admin login: <strong>admin</strong> / <strong>admin123</strong>. Change it after signing in.</div>
      <div style="text-align:center; margin-top:10px; font-family:'IBM Plex Mono',monospace; font-size:9px; color:#B7BCA4;">BUILD-MARKER-API-BACKEND-2026-A</div>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <nav class="sidebar" id="sidebarNav">
    <div class="brand">
      <div class="brand-mark">Shree Classes</div>
      <div class="brand-sub">Tuition ERP</div>
    </div>
    <ul class="nav" id="navList"></ul>
    <div class="sidebar-foot">
      <div class="who" id="whoName">—</div>
      <div class="who-role" id="whoRole">—</div>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div>
        <button class="hamburger" onclick="openSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
        <div>
          <div class="page-title" id="pageTitle">Dashboard</div>
          <div class="page-sub" id="pageSub">Overview of the institute</div>
        </div>
      </div>
      <div class="today" id="todayLabel"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">Title</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   STATE
   ============================================================ */
let DB = {
  settings: { instituteName: 'Shree Classes', adminUsername: 'admin' },
  students: [],
  batches: [],
  attendance: {},        // key: batchId__date -> { studentId: 'P'|'A' }
  fees: [],               // {id, studentId, month, amount, status:'pending'|'submitted'|'paid', paidDate, mode, screenshot, submittedDate}
  homework: [],           // {id, assignTo:'batch'|'student', batchId, studentId, title, description, dueDate, postedDate, attachments:[{name,mime,data}]}

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function monthKey(d){ return d.slice(0,7); }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}); }
function fmtMoney(n){ return '₹' + Number(n||0).toLocaleString('en-IN'); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=> t.classList.remove('show'), 2400);
}
function esc(s){ if(s===undefined||s===null) return ''; return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function monthLabel(m){ const [y,mo] = m.split('-'); return new Date(y, mo-1, 1).toLocaleDateString('en-IN', {month:'long', year:'numeric'}); }
function emptyState(big, small){ return `<div class="empty-state"><div class="big">${big}</div><div>${small}</div></div>`; }
function compressImageFile(file, maxDim=1000, quality=0.72){
  // Resizes+recompresses a photo client-side before it goes into local storage,
  // since phone camera photos (3-8MB) would otherwise blow past the ~1MB
  // per-document limit almost immediately.
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let {width, height} = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('Could not read image'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   STORAGE — backed by the Ledger ERP API (Express + PostgreSQL on
   Neon), NOT localStorage. Every device that logs in reads and writes
   the same shared database, so admin and student changes are visible
   to everyone, from any device, and survive restarts — nothing is
   tied to the browser anymore.

   Set API_BASE_URL below to your deployed backend's URL before
   publishing this file (see DEPLOY.md).
   ============================================================ */
const API_BASE_URL = 'https://ledger-erp.onrender.com'; // <-- change this after deploying the backend
let authToken = null; // kept in memory only; logging in again after a refresh is expected (same as before)

async function apiFetch(path, options = {}){
  const headers = Object.assign({ 'Content-Type': 'application/json' }, options.headers || {});
  if(authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const res = await fetch(API_BASE_URL + path, Object.assign({}, options, { headers }));
  let body = null;
  try{ body = await res.json(); }catch(e){ /* no body */ }
  if(!res.ok){
    const msg = (body && body.error) ? body.error : ('Request failed (' + res.status + ')');
    throw new Error(msg);
  }
  return body;
}

async function loadDB(){
  try{
    const data = await apiFetch('/api/data');
    Object.assign(DB, data);
  }catch(e){
    console.error('Load failed', e);
    showToast('⚠ Could not reach the server — check your connection and try again');
  }
}
async function saveKey(k){
  try{
    await apiFetch('/api/data/' + k, { method: 'PUT', body: JSON.stringify({ value: DB[k] }) });
  }catch(e){
    console.error('Save failed for', k, e);
    showToast('⚠ Could not save — ' + e.message);
  }

function switchLoginTab(tab){
  loginTab = tab;
  document.getElementById('tabAdmin').classList.toggle('active', tab==='admin');
  document.getElementById('tabStudent').classList.toggle('active', tab==='student');
  document.getElementById('loginUserLabel').textContent = tab==='admin' ? 'Username' : 'Roll Number / Username';
  document.getElementById('loginUser').placeholder = tab==='admin' ? 'admin' : 'e.g. 24';
  document.getElementById('loginHint').innerHTML = tab==='admin'
    ? 'Default admin login: <strong>admin</strong> / <strong>admin123</strong>. Change it after signing in.'
    : 'Ask your teacher for your username and password. New students default to their roll number and password <strong>student123</strong>.';
  document.getElementById('loginErr').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}
async function attemptLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errBox = document.getElementById('loginErr');
  errBox.style.display = 'none';
  const btn = document.querySelector('.login-body .btn-accent');
  if(btn){ btn.disabled = true; btn.textContent = 'Signing in...'; }
  try{
    const result = await apiFetch('/api/login', {
      method: 'POST',
      body: JSON.stringify({ role: loginTab, username: u, password: p })
    });
    authToken = result.token;
    session = loginTab==='admin' ? {role:'admin'} : {role:'student', id: result.id};
    await enterApp();
  }catch(e){
    errBox.textContent = e.message || 'Incorrect username or password.';
    errBox.style.display = 'block';
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = 'Sign In'; }
  }
}
async function enterApp(){
  await loadDB();
  if(session.role==='admin' && DB.batches.length===0) await seedBatches();
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  currentPage = session.role==='admin' ? 'dashboard' : 'sdashboard';
  render();
}
function logout(){
  session = null;
  authToken = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

  <div class="panel">
    <div class="panel-head"><div class="panel-title">Recently admitted</div><span class="mono" style="font-size:11.5px;color:var(--text-soft)">${DB.students.length} total</span></div>
    <div class="panel-body">

    <div class="panel-body">
      ${pending.length===0 ? emptyState('All clear','No pending invoices for this month.') : `
      <table class="ledger">
        <thead><tr><th>Student</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>
        ${pending.slice(0,6).map(f=>{
          const s = DB.students.find(x=>x.id===f.studentId);

function uniqueUsername(base){
  let u = String(base).trim();
  if(!u) u = 'student';
  let candidate = u, n=1;
  while(DB.students.some(s => s.username===candidate)){ n++; candidate = u + n; }
  return candidate;
}

function prefillFeeFromBatch(sel){
  const feeInput = document.getElementById('f_fee');
  if(!feeInput.value){
    const opt = sel.options[sel.selectedIndex];
    const fee = opt ? opt.dataset.fee : '';
    if(fee) feeInput.value = fee;
  }
}
async function saveStudent(id){
  const name = document.getElementById('f_name').value.trim();
  const roll = document.getElementById('f_roll').value.trim();
  if(!name || !roll){ showToast('Name and roll number are required'); return; }
  const data = {
    name, roll,
    std: document.getElementById('f_std').value.trim(),
    batchId: document.getElementById('f_batch').value || null,
    guardian: document.getElementById('f_guardian').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    monthlyFee: Number(document.getElementById('f_fee').value) || 0,
    admissionDate: document.getElementById('f_admission').value || todayISO(),
  };
  if(id){
    const s = DB.students.find(x=>x.id===id);
    Object.assign(s, data);
    await saveKey('students');
    render();
    closeModal();
    showToast('Student saved');
  } else {
    try{
      // Created server-side so the login (username + hashed password) is
      // generated and stored safely — the plaintext temp password comes
      // back once, just for this credentials screen.
      const result = await apiFetch('/api/students', { method: 'POST', body: JSON.stringify(data) });
      DB.students.push(result.student);
      render();
      showCredentialsModal(result.student, result.tempPassword);
    }catch(e){
      showToast('⚠ Could not add student — ' + e.message);
    }
  }
}
function showCredentialsModal(s, password){
  document.getElementById('modalTitle').textContent = 'Student Added — Share These Login Details';
  document.getElementById('modalBody').innerHTML = `
    <div class="hint" style="margin-top:0;">Give this username and password to ${esc(s.name)} or their parent. They can log in from the Student tab on the login screen to view homework, attendance and pay fees.</div>
    <div class="field"><label>Username</label><input value="${esc(s.username)}" readonly onclick="this.select()"></div>
    <div class="field"><label>Password</label><input value="${esc(password)}" readonly onclick="this.select()"></div>
    <div class="hint">They can change this password anytime from their Profile page after logging in.</div>
  `;
  document.getElementById('modalFoot').innerHTML = `<button class="btn btn-primary" onclick="closeModal()">Done</button>`;
  openModal();
}
async function resetStudentPassword(id){
  const s = DB.students.find(x=>x.id===id);
  if(!confirm(`Reset password for ${s.name}?`)) return;
  try{
    const result = await apiFetch('/api/students/' + id + '/reset-password', { method: 'POST' });
    showToast(`Password reset to "${result.tempPassword}" — share this with ${s.name}`);
  }catch(e){
    showToast('⚠ Could not reset password — ' + e.message);
  }
}
async function deleteStudent(id){
  if(!confirm('Delete this student? This also removes their fee and attendance records.')) return;
  try{
    await apiFetch('/api/students/' + id, { method: 'DELETE' });
    DB.students = DB.students.filter(x=>x.id!==id);
    DB.fees = DB.fees.filter(f=>f.studentId!==id);
    await saveKey('fees'); // students array already updated server-side by the delete endpoint
    render();
    showToast('Student deleted');
  }catch(e){
    showToast('⚠ Could not delete student — ' + e.message);
  }
}

function saveBatch(id){

function seedBatches(){

  DB.batches.push(
    {id: uid('bat'), name:'Morning Batch', fee:1500, days:['Mon','Tue','Wed','Thu','Fri','Sat'], time:'7:00 AM – 9:00 AM'},
    {id: uid('bat'), name:'Evening Batch', fee:1500, days:['Mon','Tue','Wed','Thu','Fri','Sat'], time:'5:00 PM – 7:00 PM'}
  );
  saveKey('batches');
}

function setAttendance(studentId, val){
  const attKey = attBatchId + '__' + attDate;
  if(!DB.attendance[attKey]) DB.attendance[attKey] = {};
  DB.attendance[attKey][studentId] = val;
  saveKey('attendance');
  render();
}
function markAll(val){
  const attKey = attBatchId + '__' + attDate;
  if(!DB.attendance[attKey]) DB.attendance[attKey] = {};
  DB.students.filter(s=>s.batchId===attBatchId).forEach(s => DB.attendance[attKey][s.id] = val);
  saveKey('attendance');
  render();
  showToast('Attendance updated');
}

function hwTargetLabel(h){
  if(h.assignTo==='student'){
    const s = DB.students.find(x=>x.id===h.studentId);
    return s ? '👤 '+esc(s.name) : '👤 Unknown student';
  }
  const b = DB.batches.find(x=>x.id===h.batchId);
  return b ? esc(b.name)+' (whole batch)' : 'Unknown batch';
}
function renderAttachments(list){
  if(!list || !list.length) return '';
  return `<div class="att-list">${list.map(a=>{
    const isImg = (a.mime||'').startsWith('image/');
    return `<a class="att-chip" href="${a.data}" target="_blank" download="${esc(a.name)}" title="${esc(a.name)}">
      ${isImg ? `<img src="${a.data}">` : `<span class="att-ico">📄</span>`}
      <span class="att-name">${esc(a.name)}</span>
    </a>`;
  }).join('')}</div>`;
}
function renderHomeworkAdmin(){
  const items = [...DB.homework].sort((a,b)=> (b.postedDate||'').localeCompare(a.postedDate||''));
  return `
  <div class="searchbar" style="justify-content:flex-end;">
    <button class="btn btn-accent" onclick="openHomeworkForm()">+ Assign Homework</button>
  </div>
  ${items.length===0 ? emptyState('No homework assigned yet','Assign homework to a whole batch or a single student.') :
    items.map(h => {
      let doneBadge = '';
      if(h.assignTo==='student'){
        const done = DB.homeworkStatus[h.id+'__'+h.studentId]==='done';
        doneBadge = `<span class="pill ${done?'pill-green':'pill-blue'}">${done?'Done':'Not done yet'}</span>`;
      } else {
        const batchStudents = DB.students.filter(s=>s.batchId===h.batchId);
        const doneCt = batchStudents.filter(s => DB.homeworkStatus[h.id+'__'+s.id]==='done').length;
        doneBadge = `<span class="pill pill-blue">${doneCt}/${batchStudents.length} done</span>`;
      }
      return `<div class="hw-card">
        <div class="hw-top">
          <div>
            <div class="hw-title">${esc(h.title)}</div>
            <div class="hw-meta">${hwTargetLabel(h)} · Due ${fmtDate(h.dueDate)} · Posted ${fmtDate(h.postedDate)}</div>
          </div>
          <div class="row-actions">
            ${doneBadge}
            <button class="btn btn-ghost btn-sm" onclick="openHomeworkForm('${h.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteHomework('${h.id}')">Delete</button>
          </div>
        </div>
        ${h.description ? `<div class="hw-desc">${esc(h.description)}</div>` : ''}
        ${renderAttachments(h.attachments)}
      </div>`;
    }).join('')
  }`;
}
let hwAttachments = [];
let editingHomeworkId = null;
function openHomeworkForm(hwId){
  editingHomeworkId = hwId || null;
  const editing = editingHomeworkId ? DB.homework.find(x=>x.id===editingHomeworkId) : null;
  hwAttachments = editing && editing.attachments ? JSON.parse(JSON.stringify(editing.attachments)) : [];
  const assignTo = editing ? editing.assignTo : 'batch';
  const batchOptions = DB.batches.map(b=>`<option value="${b.id}" ${editing && editing.batchId===b.id?'selected':''}>${esc(b.name)}</option>`).join('');
  const studentOptions = DB.students.map(s=>{
    const b = DB.batches.find(x=>x.id===s.batchId);
    return `<option value="${s.id}" ${editing && editing.studentId===s.id?'selected':''}>${esc(s.name)}${b?' — '+esc(b.name):''}</option>`;
  }).join('');
  document.getElementById('modalTitle').textContent = editing ? 'Edit Homework' : 'Assign Homework';
  document.getElementById('modalBody').innerHTML = `
    <div class="assign-toggle">
      <button type="button" id="atBatch" class="${assignTo==='batch'?'active':''}" onclick="setHwAssignTo('batch')">Whole Batch</button>
      <button type="button" id="atStudent" class="${assignTo==='student'?'active':''}" onclick="setHwAssignTo('student')">Individual Student</button>
    </div>
    <div class="field" id="hwBatchField" style="${assignTo==='student'?'display:none;':''}">
      <label>Batch</label><select id="f_hbatch">${DB.batches.length?batchOptions:'<option>No batches yet</option>'}</select>
    </div>
    <div class="field" id="hwStudentField" style="${assignTo==='batch'?'display:none;':''}">
      <label>Student</label><select id="f_hstudent">${DB.students.length?studentOptions:'<option>No students yet</option>'}</select>
    </div>
    <div class="field"><label>Title</label><input id="f_htitle" placeholder="e.g. Chapter 4 — Exercise 4.2" value="${editing?esc(editing.title):''}"></div>
    <div class="field"><label>Details</label><textarea id="f_hdesc" placeholder="Instructions for students...">${editing?esc(editing.description||''):''}</textarea></div>
    <div class="field"><label>Due Date</label><input type="date" id="f_hdue" value="${editing?editing.dueDate:todayISO()}"></div>
    <div class="field">
      <label>Attach photos or PDF</label>
      <div class="upload-box" onclick="document.getElementById('f_hwfile').click()">
        <div style="font-size:12.5px;color:var(--text-soft);">Tap to add photos or PDF files (you can add more than one)</div>
        <input type="file" id="f_hwfile" accept="image/*,.pdf,application/pdf" multiple onchange="handleHwFileSelect(event)">
      </div>
      <div id="hwAttachPreview">${renderAttachments(hwAttachments)}</div>
    </div>
  `;
  document.getElementById('modalFoot').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveHomework()">${editing?'Save Changes':'Assign'}</button>
  `;
  openModal();
  refreshHwAttachPreview();
}
function setHwAssignTo(mode){
  document.getElementById('atBatch').classList.toggle('active', mode==='batch');
  document.getElementById('atStudent').classList.toggle('active', mode==='student');
  document.getElementById('hwBatchField').style.display = mode==='batch' ? '' : 'none';
  document.getElementById('hwStudentField').style.display = mode==='student' ? '' : 'none';
}
async function handleHwFileSelect(evt){
  const files = [...evt.target.files];
  if(!files.length) return;
  for(const file of files){
    if(file.type.startsWith('image/')){
      try{
        const dataUrl = await compressImageFile(file);
        hwAttachments.push({name: file.name, mime: 'image/jpeg', data: dataUrl});
      }catch(e){ showToast('Could not read '+file.name); }
    } else {
      if(file.size > 700*1024){ showToast(file.name+' is too large (max ~700KB) — compress the PDF first'); continue; }
      try{
        const dataUrl = await new Promise((resolve,reject)=>{
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('read failed'));
          reader.readAsDataURL(file);
        });
        hwAttachments.push({name: file.name, mime: file.type||'application/pdf', data: dataUrl});
      }catch(e){ showToast('Could not read '+file.name); }
    }
  }
  refreshHwAttachPreview();
  evt.target.value = '';
}
function refreshHwAttachPreview(){
  const el = document.getElementById('hwAttachPreview');
  if(!el) return;
  el.innerHTML = hwAttachments.length ? `<div class="att-list">${hwAttachments.map((a,i)=>`
    <span class="att-chip" title="${esc(a.name)}">
      ${(a.mime||'').startsWith('image/') ? `<img src="${a.data}">` : `<span class="att-ico">📄</span>`}
      <span class="att-name">${esc(a.name)}</span>
      <span class="att-remove" onclick="removeHwAttachment(${i})">✕</span>
    </span>`).join('')}</div>` : '';
}
function removeHwAttachment(idx){
  hwAttachments.splice(idx,1);
  refreshHwAttachPreview();
}
function saveHomework(){
  const assignTo = document.getElementById('atStudent').classList.contains('active') ? 'student' : 'batch';
  const title = document.getElementById('f_htitle').value.trim();
  if(!title){ showToast('Title is required'); return; }
  const batchId = document.getElementById('f_hbatch').value;
  const studentId = document.getElementById('f_hstudent') ? document.getElementById('f_hstudent').value : null;
  if(assignTo==='batch' && !batchId){ showToast('Select a batch'); return; }
  if(assignTo==='student' && !studentId){ showToast('Select a student'); return; }
  const payload = {
    assignTo,
    batchId: assignTo==='batch' ? batchId : (DB.students.find(s=>s.id===studentId)||{}).batchId || null,
    studentId: assignTo==='student' ? studentId : null,
    title,
    description: document.getElementById('f_hdesc').value.trim(),
    dueDate: document.getElementById('f_hdue').value || todayISO(),
    attachments: hwAttachments,
  };
  if(editingHomeworkId){
    const existing = DB.homework.find(x=>x.id===editingHomeworkId);
    Object.assign(existing, payload);
  } else {
    DB.homework.push({ id: uid('hw'), postedDate: todayISO(), ...payload });
  }
  saveKey('homework');
  const wasEditing = !!editingHomeworkId;
  editingHomeworkId = null; hwAttachments = [];
  closeModal(); render();
  showToast(wasEditing ? 'Homework updated' : 'Homework assigned');
}
function deleteHomework(id){
  if(!confirm('Delete this homework?')) return;
  DB.homework = DB.homework.filter(x=>x.id!==id);
  saveKey('homework');
  render();
  showToast('Homework deleted');
}

let feeFilterMonth = monthKey(todayISO());
function renderFees(){
  const monthFees = DB.fees.filter(f=>f.month===feeFilterMonth);
  const collected = monthFees.filter(f=>f.status==='paid').reduce((s,f)=>s+Number(f.amount),0);
  const submitted = monthFees.filter(f=>f.status==='submitted');
  const submittedAmt = submitted.reduce((s,f)=>s+Number(f.amount),0);
  const pendingAmt = monthFees.filter(f=>f.status==='pending').reduce((s,f)=>s+Number(f.amount),0);
  return `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Collected</div><div class="stat-num">${fmtMoney(collected)}</div><div class="stat-note">${monthFees.filter(f=>f.status==='paid').length} payments</div></div>
    <div class="stat-card"><div class="stat-label">Awaiting Verification</div><div class="stat-num">${fmtMoney(submittedAmt)}</div><div class="stat-note">${submitted.length} screenshot${submitted.length===1?'':'s'} to check</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-num">${fmtMoney(pendingAmt)}</div><div class="stat-note">${monthFees.filter(f=>f.status==='pending').length} invoices</div></div>
    <div class="stat-card"><div class="stat-label">Total students billed</div><div class="stat-num">${monthFees.length}</div><div class="stat-note">for ${monthLabel(feeFilterMonth)}</div></div>
  </div>
  <div class="searchbar">
    <input type="month" value="${feeFilterMonth}" onchange="feeFilterMonth=this.value; render();" style="max-width:180px;">
    <button class="btn btn-ghost" onclick="openGenerateInvoicesModal()">Generate invoices…</button>
    <button class="btn btn-accent" onclick="openFeeForm()">+ Record Payment</button>
  </div>
  <div class="panel">
    <div class="panel-body" style="padding:0;">
      ${monthFees.length===0 ? emptyState('No invoices for this month', 'Click "Generate invoices…" to choose which students to bill.') : `
      <table class="ledger">
        <thead><tr><th>Student</th><th>Batch</th><th>Amount</th><th>Status</th><th>Screenshot</th><th>Paid On</th><th>Mode</th><th></th></tr></thead>
        <tbody>
        ${monthFees.map(f=>{
          const s = DB.students.find(x=>x.id===f.studentId);
          const b = s ? DB.batches.find(x=>x.id===s.batchId) : null;
          let statusPill;
          if(f.status==='paid') statusPill = '<span class="pill pill-green">Paid</span>';
          else if(f.status==='submitted') statusPill = '<span class="pill pill-mustard">Awaiting Verification</span>';
          else statusPill = '<span class="pill pill-red">Pending</span>';
          let actions = '';
          if(f.status==='submitted'){
            actions = `<button class="btn btn-primary btn-sm" onclick="openVerifyModal('${f.id}')">Review</button>`;
          } else if(f.status==='pending'){
            actions = `<button class="btn btn-primary btn-sm" onclick="markFeePaid('${f.id}')">Mark Paid</button>`;
          } else {
            actions = `<button class="btn btn-ghost btn-sm" onclick="markFeePending('${f.id}')">Undo</button>`;
          }
          return `<tr>
            <td><strong>${s?esc(s.name):'Unknown'}</strong></td>
            <td>${b?esc(b.name):'—'}</td>
            <td class="mono">${fmtMoney(f.amount)}</td>
            <td>${statusPill}</td>
            <td>${f.screenshot ? `<img src="${f.screenshot}" class="ss-thumb" onclick="openVerifyModal('${f.id}')" title="View screenshot">` : '—'}</td>
            <td class="mono">${f.paidDate?fmtDate(f.paidDate):'—'}</td>
            <td class="mono">${esc(f.mode||'—')}</td>
            <td class="row-actions">
              ${actions}
              <button class="btn btn-danger btn-sm" onclick="deleteFee('${f.id}')">Delete</button>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`}
    </div>
  </div>`;
}
function openVerifyModal(feeId){
  const f = DB.fees.find(x=>x.id===feeId);
  const s = DB.students.find(x=>x.id===f.studentId);
  document.getElementById('modalTitle').textContent = 'Verify Payment — ' + (s?s.name:'') + ' · ' + monthLabel(f.month);
  document.getElementById('modalBody').innerHTML = `
    <div class="pay-modal-amount">${fmtMoney(f.amount)}</div>
    ${f.screenshot ? `<img src="${f.screenshot}" class="verify-img">` : `<div class="hint">No screenshot uploaded yet.</div>`}
    <div class="hint" style="text-align:center;">${f.submittedDate ? 'Submitted on '+fmtDate(f.submittedDate) : ''}</div>
  `;
  document.getElementById('modalFoot').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    ${f.status==='submitted' ? `<button class="btn btn-danger" onclick="rejectFeeSubmission('${f.id}')">Reject</button>
    <button class="btn btn-accent" onclick="confirmVerifiedPayment('${f.id}')">Confirm &amp; Mark Paid</button>` : ''}
  `;
  openModal();
}
function confirmVerifiedPayment(feeId){
  const f = DB.fees.find(x=>x.id===feeId);
  f.status = 'paid'; f.paidDate = todayISO(); f.mode = f.mode || 'Online (UPI)';
  saveKey('fees');
  closeModal(); render();
  showToast('Payment verified and marked as paid ✓');
}
function rejectFeeSubmission(feeId){
  const f = DB.fees.find(x=>x.id===feeId);
  f.status = 'pending'; f.screenshot = null; f.submittedDate = null;
  saveKey('fees');
  closeModal(); render();
  showToast('Submission rejected — invoice reset to pending');
}
function openGenerateInvoicesModal(){
  if(!DB.students.length){ showToast('Add students first'); return; }
  document.getElementById('modalTitle').textContent = 'Generate Invoices — ' + monthLabel(feeFilterMonth);
  const rows = DB.students.map(s=>{
    const b = s.batchId ? DB.batches.find(x=>x.id===s.batchId) : null;
    const amount = s.monthlyFee > 0 ? s.monthlyFee : (b ? b.fee : 0);
    const already = DB.fees.some(f => f.studentId===s.id && f.month===feeFilterMonth);
    const disabled = already || !amount;
    const note = already ? 'Already invoiced' : (!amount ? 'No fee set — skip' : (b?esc(b.name):'No batch'));
    return `<label class="pick-row${disabled?' disabled':''}">
      <input type="checkbox" class="invoicePick" value="${s.id}" data-amount="${amount}" ${disabled?'disabled':'checked'}>
      <div class="pick-name">${esc(s.name)}<div class="pick-sub">${note}${amount?' · '+fmtMoney(amount):''}</div></div>
    </label>`;
  }).join('');
  document.getElementById('modalBody').innerHTML = `
    <div class="pick-header">
      <div class="hint" style="margin:0;">Choose which students to bill for ${monthLabel(feeFilterMonth)}.</div>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-soft);white-space:nowrap;">
        <input type="checkbox" id="pickAll" checked onchange="toggleAllInvoicePicks(this)"> Select all
      </label>
    </div>
    <div class="pick-list">${rows}</div>
  `;
  document.getElementById('modalFoot').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-accent" onclick="generateSelectedInvoices()">Generate Selected</button>
  `;
  openModal();
}
function toggleAllInvoicePicks(master){
  document.querySelectorAll('.invoicePick:not(:disabled)').forEach(cb => cb.checked = master.checked);
}
function generateSelectedInvoices(){
  const checked = [...document.querySelectorAll('.invoicePick:checked')];
  if(!checked.length){ showToast('Select at least one student'); return; }
  let created = 0;
  checked.forEach(cb => {
    const studentId = cb.value;
    const amount = Number(cb.dataset.amount);
    const exists = DB.fees.some(f => f.studentId===studentId && f.month===feeFilterMonth);
    if(exists || !amount) return;
    DB.fees.push({id: uid('fee'), studentId, month: feeFilterMonth, amount, status:'pending', paidDate:null, mode:null});
    created++;
  });
  saveKey('fees');
  closeModal(); render();
  showToast(created ? `Generated ${created} invoice(s)` : 'No new invoices generated');
}
function openFeeForm(){
  const studentOptions = DB.students.map(s=>`<option value="${s.id}" data-fee="${s.monthlyFee||0}">${esc(s.name)} — #${esc(s.roll)}</option>`).join('');
  document.getElementById('modalTitle').textContent = 'Record Payment';
  document.getElementById('modalBody').innerHTML = `
    <div class="field"><label>Student</label><select id="f_fstudent" onchange="prefillAmountFromStudent(this)">${DB.students.length?studentOptions:'<option>No students yet</option>'}</select></div>
    <div class="field-row">
      <div class="field"><label>Month</label><input type="month" id="f_fmonth" value="${feeFilterMonth}"></div>
      <div class="field"><label>Amount (₹)</label><input type="number" id="f_famount" placeholder="e.g. 1500"></div>
    </div>
    <div class="field"><label>Payment Mode</label><select id="f_fmode"><option>Cash</option><option>UPI</option><option>Bank Transfer</option><option>Cheque</option></select></div>
  `;
  document.getElementById('modalFoot').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveFeePayment()">Save Payment</button>
  `;
  openModal();
  const sel = document.getElementById('f_fstudent');
  if(sel) prefillAmountFromStudent(sel);
}
function prefillAmountFromStudent(sel){
  const amountInput = document.getElementById('f_famount');
  const opt = sel.options[sel.selectedIndex];
  const fee = opt ? opt.dataset.fee : '';
  if(fee && Number(fee)>0) amountInput.value = fee;
}
function saveFeePayment(){
  const studentId = document.getElementById('f_fstudent').value;
  const month = document.getElementById('f_fmonth').value;
  const amount = Number(document.getElementById('f_famount').value);
  const mode = document.getElementById('f_fmode').value;
  if(!studentId || !month || !amount){ showToast('Fill in all fields'); return; }
  const existing = DB.fees.find(f=>f.studentId===studentId && f.month===month);
  if(existing){ Object.assign(existing, {amount, status:'paid', paidDate: todayISO(), mode}); }
  else { DB.fees.push({id: uid('fee'), studentId, month, amount, status:'paid', paidDate: todayISO(), mode}); }
  saveKey('fees');
  closeModal(); render();
  showToast('Payment recorded');
}
function markFeePaid(id){ const f = DB.fees.find(x=>x.id===id); f.status='paid'; f.paidDate=todayISO(); f.mode = f.mode || 'Cash'; saveKey('fees'); render(); showToast('Marked as paid'); }
function markFeePending(id){ const f = DB.fees.find(x=>x.id===id); f.status='pending'; f.paidDate=null; saveKey('fees'); render(); }
function deleteFee(id){ if(!confirm('Delete this fee record?')) return; DB.fees = DB.fees.filter(x=>x.id!==id); saveKey('fees'); render(); showToast('Fee record deleted'); }

          }).join('')
        }
      </div>`;
    }).join('')}
  </div>`;
}

function studentAttendanceStats(studentId){
  let present=0, total=0;
  const history = [];
  Object.keys(DB.attendance).forEach(key => {
    const rec = DB.attendance[key];
    if(rec[studentId]){
      total++;
      if(rec[studentId]==='P') present++;
      const [batchId, date] = key.split('__');
      history.push({date, status: rec[studentId], batchId});
    }
  });
  history.sort((a,b)=> b.date.localeCompare(a.date));
  return { present, total, pct: total? Math.round(present/total*100): null, history };
}
function hwForStudent(s){
  return DB.homework.filter(h => h.assignTo==='student' ? h.studentId===s.id : h.batchId===s.batchId);
}

  const s = myStudent();
  const b = DB.batches.find(x=>x.id===s.batchId);
  const stats = studentAttendanceStats(s.id);
  const myHw = hwForStudent(s).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const pendingHw = myHw.filter(h => DB.homeworkStatus[h.id+'__'+s.id]!=='done' && h.dueDate>=todayISO());
  const myFees = DB.fees.filter(f=>f.studentId===s.id);
  const duePending = myFees.filter(f=>f.status==='pending');
  const dueAmt = duePending.reduce((sum,f)=>sum+Number(f.amount),0);

  return `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Your Batch</div><div class="stat-num" style="font-size:20px;">${b?esc(b.name):'Unassigned'}</div><div class="stat-note">${b?(b.days||[]).join(', ')+' · '+esc(b.time||''):'Contact your teacher'}</div></div>
    <div class="stat-card"><div class="stat-label">Attendance</div><div class="stat-num">${stats.pct===null?'—':stats.pct+'%'}</div><div class="stat-note">${stats.present}/${stats.total} classes present</div></div>
    <div class="stat-card"><div class="stat-label">Homework Due</div><div class="stat-num">${pendingHw.length}</div><div class="stat-note">not yet marked done</div></div>
    <div class="stat-card"><div class="stat-label">Fees Due</div><div class="stat-num">${fmtMoney(dueAmt)}</div><div class="stat-note">${duePending.length} pending invoice${duePending.length===1?'':'s'}</div></div>
  </div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Upcoming homework</div></div>
    <div class="panel-body">
      ${pendingHw.length===0 ? emptyState('Nothing pending',"You're all caught up.") :
        pendingHw.slice(0,4).map(h=>`<div class="hw-card" style="margin-bottom:8px;">
          <div class="hw-top"><div><div class="hw-title" style="font-size:14.5px;">${esc(h.title)}</div><div class="hw-meta">Due ${fmtDate(h.dueDate)}</div></div></div>
        </div>`).join('')
      }
    </div>
  </div>`;
}
function renderStudentHomework(){
  const s = myStudent();
  const items = hwForStudent(s).sort((a,b)=> a.dueDate.localeCompare(b.dueDate));
  if(items.length===0) return emptyState('No homework yet',"Your teacher hasn't assigned anything yet.");
  return items.map(h=>{
    const key = h.id+'__'+s.id;
    const done = DB.homeworkStatus[key]==='done';
    const overdue = !done && h.dueDate < todayISO();
    return `<div class="hw-card">
      <div class="hw-top">
        <div>
          <div class="hw-title">${esc(h.title)}</div>
          <div class="hw-meta">${h.assignTo==='student'?'Just for you':'Whole batch'} · Due ${fmtDate(h.dueDate)} ${overdue?'<span class="pill pill-red" style="margin-left:6px;">Overdue</span>':''}</div>
        </div>
        <div class="hw-done-badge">
          <span class="mono" style="font-size:11px;color:var(--text-soft);">${done?'Done':'Mark done'}</span>
          <div class="check-toggle ${done?'done':''}" onclick="toggleHomeworkDone('${h.id}')">${done?'✓':''}</div>
        </div>
      </div>
      ${h.description ? `<div class="hw-desc">${esc(h.description)}</div>` : ''}
      ${renderAttachments(h.attachments)}
    </div>`;
  }).join('');
}
function toggleHomeworkDone(hwId){
  const s = myStudent();
  const key = hwId+'__'+s.id;
  DB.homeworkStatus[key] = DB.homeworkStatus[key]==='done' ? undefined : 'done';
  if(DB.homeworkStatus[key]===undefined) delete DB.homeworkStatus[key];
  saveKey('homeworkStatus');
  render();
}
function renderStudentAttendance(){
  const s = myStudent();
  const stats = studentAttendanceStats(s.id);
  return `
  <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);">
    <div class="stat-card"><div class="stat-label">Overall Attendance</div><div class="stat-num">${stats.pct===null?'—':stats.pct+'%'}</div></div>
    <div class="stat-card"><div class="stat-label">Present</div><div class="stat-num">${stats.present}</div></div>
    <div class="stat-card"><div class="stat-label">Absent</div><div class="stat-num">${stats.total-stats.present}</div></div>
  </div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">History</div></div>
    <div class="panel-body" style="padding:0;">
      ${stats.history.length===0 ? emptyState('No attendance recorded yet','Check back after your first class.') : `
      <table class="ledger">
        <thead><tr><th>Date</th><th>Status</th></tr></thead>
        <tbody>
        ${stats.history.map(h=>`<tr><td class="mono">${fmtDate(h.date)}</td><td>${h.status==='P'?'<span class="pill pill-green">Present</span>':'<span class="pill pill-red">Absent</span>'}</td></tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  </div>`;
}
function renderStudentFees(){
  const s = myStudent();
  const myFees = [...DB.fees.filter(f=>f.studentId===s.id)].sort((a,b)=> b.month.localeCompare(a.month));
  return `
  <div class="hint" style="margin-bottom:16px;">Parents can use this same login to check dues and pay fees on ${esc(s.name)}'s behalf — just share the username and password from the Profile page.</div>
  ${myFees.length===0 ? emptyState('No invoices yet',"Your teacher hasn't generated any invoices for you yet.") :
    myFees.map(f => {
      let statusNote, pill, action;
      if(f.status==='paid'){
        statusNote = 'Paid on '+fmtDate(f.paidDate)+' · '+esc(f.mode||'');
        pill = '<span class="pill pill-green">Paid</span>';
        action = '';
      } else if(f.status==='submitted'){
        statusNote = 'Screenshot submitted on '+fmtDate(f.submittedDate)+' · awaiting admin confirmation';
        pill = '<span class="pill pill-mustard">Awaiting Verification</span>';
        action = `<button class="btn btn-ghost btn-sm" onclick="openPayModal('${f.id}')">View / Resubmit</button>`;
      } else {
        statusNote = 'Payment pending';
        pill = '<span class="pill pill-red">Pending</span>';
        action = `<button class="btn btn-accent btn-sm" onclick="openPayModal('${f.id}')">Pay Now</button>`;
      }
      return `<div class="payline">
      <div>
        <div style="font-weight:600;">${monthLabel(f.month)}</div>
        <div class="mono" style="font-size:11.5px;color:var(--text-soft);">${statusNote}</div>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="mono" style="font-size:16px;font-weight:600;">${fmtMoney(f.amount)}</div>
        ${pill}
        ${action}
      </div>
    </div>`;
    }).join('')
  }`;
}
let pendingScreenshotData = null;
function openPayModal(feeId){
  const f = DB.fees.find(x=>x.id===feeId);
  pendingScreenshotData = f.screenshot || null;
  document.getElementById('modalTitle').textContent = 'Pay Fee — ' + monthLabel(f.month);
  document.getElementById('modalBody').innerHTML = `
    <div class="pay-modal-amount">${fmtMoney(f.amount)}</div>
    <div class="qr-wrap"><img src="${FEE_QR_IMAGE}" alt="PhonePe payment QR code"></div>
    <div class="hint" style="text-align:center;margin-top:-4px;">Scan with any UPI app (PhonePe, Google Pay, Paytm) and pay the exact amount above.</div>
    <label style="margin-top:14px;">Upload payment screenshot</label>
    <div class="upload-box" id="ssUploadBox" onclick="document.getElementById('f_screenshot').click()">
      <div id="ssUploadInner">
        ${f.screenshot ? `<img src="${f.screenshot}" class="upload-preview">` : ''}
        <div style="font-size:12.5px;color:var(--text-soft);">${f.screenshot ? 'Tap to replace screenshot' : 'Tap to select a screenshot from your gallery'}</div>
      </div>
      <input type="file" id="f_screenshot" accept="image/*" onchange="handleScreenshotSelect(event)">
    </div>
    <div class="hint" style="margin-top:10px;">After you submit, this invoice moves to "Awaiting Verification" — the admin will check your screenshot and confirm it before it shows as fully Paid.</div>
  `;
  document.getElementById('modalFoot').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-accent" onclick="submitFeeForVerification('${feeId}')">I've Paid — Submit for Verification</button>
  `;
  openModal();
}
async function handleScreenshotSelect(evt){
  const file = evt.target.files[0];
  if(!file) return;
  try{
    pendingScreenshotData = await compressImageFile(file);
    document.getElementById('ssUploadInner').innerHTML = `
      <img src="${pendingScreenshotData}" class="upload-preview">
      <div style="font-size:12.5px;color:var(--text-soft);">Tap to replace screenshot</div>`;
  }catch(e){ showToast('Could not read that image, try another file'); }
}
function submitFeeForVerification(feeId){
  if(!pendingScreenshotData){ showToast('Please upload your payment screenshot first'); return; }
  const f = DB.fees.find(x=>x.id===feeId);
  f.status = 'submitted';
  f.screenshot = pendingScreenshotData;
  f.submittedDate = todayISO();
  saveKey('fees');
  pendingScreenshotData = null;
  closeModal(); render();
  showToast('Submitted — the admin will confirm your payment shortly ✓');
}

          <tr><td style="color:var(--text-soft);">Username</td><td class="mono">${esc(s.username)}</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Change password</div></div>
    <div class="panel-body">
      <div class="field-row">
        <div class="field"><label>New Password</label><input id="f_newpass" type="password" placeholder="At least 6 characters"></div>
        <div class="field"><label>Confirm Password</label><input id="f_newpass2" type="password" placeholder="Repeat password"></div>
      </div>
      <button class="btn btn-primary" onclick="changeMyPassword()">Update Password</button>
    </div>
  </div>`;
}
async function changeMyPassword(){
  const p1 = document.getElementById('f_newpass').value;
  const p2 = document.getElementById('f_newpass2').value;
  if(p1.length<6){ showToast('Password must be at least 6 characters'); return; }
  if(p1!==p2){ showToast('Passwords do not match'); return; }
  try{
    await apiFetch('/api/me/change-password', { method: 'POST', body: JSON.stringify({ newPassword: p1 }) });
    showToast('Password updated');
    document.getElementById('f_newpass').value=''; document.getElementById('f_newpass2').value='';
  }catch(e){
    showToast('⚠ Could not update password — ' + e.message);
  }
}

function renderAdminSettings(){
  return `
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Institute</div></div>
    <div class="panel-body">
      <div class="field"><label>Institute Name</label><input id="f_instituteName" value="${esc(DB.settings.instituteName||'')}"></div>
      <button class="btn btn-primary" onclick="saveInstituteName()">Save Name</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Admin Login</div></div>
    <div class="panel-body">
      <div class="field"><label>Username</label><input id="f_adminUser" value="${esc(DB.settings.adminUsername||'')}"></div>
      <div class="field-row">
        <div class="field"><label>New Password</label><input id="f_adminPass1" type="password" placeholder="Leave blank to keep current"></div>
        <div class="field"><label>Confirm New Password</label><input id="f_adminPass2" type="password" placeholder="Repeat new password"></div>
      </div>
      <div class="field"><label>Current Password</label><input id="f_adminPassCurrent" type="password" placeholder="Required to confirm changes"></div>
      <button class="btn btn-primary" onclick="saveAdminCredentials()">Save Login Details</button>
    </div>
  </div>`;
}
function saveInstituteName(){
  const name = document.getElementById('f_instituteName').value.trim();
  if(!name){ showToast('Institute name can\'t be empty'); return; }
  DB.settings.instituteName = name;
  saveKey('settings');
  showToast('Institute name updated');
}
async function saveAdminCredentials(){
  const newUser = document.getElementById('f_adminUser').value.trim();
  const p1 = document.getElementById('f_adminPass1').value;
  const p2 = document.getElementById('f_adminPass2').value;
  const current = document.getElementById('f_adminPassCurrent').value;
  if(!newUser){ showToast('Username can\'t be empty'); return; }
  if(!current){ showToast('Enter your current password to confirm changes'); return; }
  if(p1 || p2){
    if(p1.length<6){ showToast('New password must be at least 6 characters'); return; }
    if(p1!==p2){ showToast('New passwords do not match'); return; }
  }
  try{
    await apiFetch('/api/admin/credentials', {
      method: 'POST',
      body: JSON.stringify({ currentPassword: current, newUsername: newUser, newPassword: p1 || undefined })
    });
  }catch(e){
    showToast('⚠ ' + e.message);
    return;
  }
  DB.settings.adminUsername = newUser;
  showToast('Admin login updated');
  document.getElementById('f_adminPass1').value='';
  document.getElementById('f_adminPass2').value='';
  document.getElementById('f_adminPassCurrent').value='';
}
